<style>
:root {
  --bg:    #ffffff;
  --bg2:   #eeece6;
  --bord1: rgba(0,0,0,0.12);
  --bord2: rgba(0,0,0,0.28);
  --txt1:  #1a1a18;
  --txt2:  #5f5e5a;
  --txt3:  #9a9890;
  --rad-md: 8px;
  --rad-lg: 12px;
  --sans: system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:#f4f2ec;padding:24px;color:var(--txt1)}
.wrap{display:flex;flex-direction:column;gap:10px;width:574px;margin:0 auto}
.top-row{display:flex;gap:8px;align-items:stretch}
.card{background:var(--bg);border:0.5px solid var(--bord1);border-radius:var(--rad-lg);padding:10px 12px}
.fside{display:flex;flex-direction:column;justify-content:space-between;gap:6px;width:126px;flex-shrink:0}
.fbtn{border:1.5px solid;border-radius:var(--rad-md);padding:7px 9px;cursor:pointer;
  text-align:left;font-family:var(--sans);transition:opacity .15s,background .15s;width:100%}
.fbtn.off{opacity:0.38}
.fn{font-size:12px;font-weight:600}
.fs2{font-size:11px;margin-top:1px;opacity:.8}
.fa{font-size:11px;font-weight:600;margin-top:3px}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.slb{font-size:13px;color:var(--txt2);white-space:nowrap}
.nv{font-size:15px;font-weight:600;min-width:24px;text-align:right}
.lam{font-size:11px;color:var(--txt2);margin-bottom:6px;padding:4px 7px;
  background:var(--bg2);border-radius:var(--rad-md);line-height:1.7}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:5px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txt2)}
.ls{width:16px;height:2.5px;border-radius:1px;flex-shrink:0}
.pond-hint{font-size:11px;color:var(--txt3);text-align:center;padding:4px 0 5px}
input[type=range]{width:100%;accent-color:#185FA5;cursor:pointer}
</style>

<body>
<div class="wrap">
  <div class="top-row">
    <div class="fside" id="fleft"></div>
    <div class="card" style="padding:5px;flex:0 0 auto">
      <div class="pond-hint">Click on each feeder to toggle it on or off</div>
      <svg id="pond" width="296" height="248" viewBox="0 0 296 248">
        <defs><clipPath id="pcl"><ellipse cx="148" cy="124" rx="110" ry="80"/></clipPath></defs>
        <ellipse cx="148" cy="124" rx="110" ry="80" fill="#4388BE"/>
        <ellipse cx="139" cy="116" rx="62" ry="45" fill="#6AAAD8" opacity="0.26"/>
        <ellipse cx="148" cy="124" rx="110" ry="80" fill="none" stroke="#2D6C9B" stroke-width="1.5"/>
        <g id="ducks" clip-path="url(#pcl)"></g>
        <g id="feeders"></g>
      </svg>
      <div class="pond-hint" style="padding:5px 0 2px">&copy; 2026 Theodore P. Pavlic &mdash; MIT License</div>
    </div>
    <div class="fside" id="fright"></div>
  </div>
  <div class="card">
    <div class="srow">
      <span class="slb">N =</span>
      <input type="range" min="1" max="25" value="11" id="nsl" step="1" style="flex:1">
      <span class="nv" id="nv">11</span>
      <span style="font-size:11px;color:var(--txt3)">ducks</span>
    </div>
    <div class="lam" id="lam"></div>
    <svg id="chart" width="550" height="196" viewBox="0 0 460 196" style="display:block;max-width:100%">
      <defs><clipPath id="cc2"><rect x="46" y="10" width="328" height="152"/></clipPath></defs>
      <g id="cgr"></g>
      <g id="cax"></g>
      <g id="ccv" clip-path="url(#cc2)"></g>
      <g id="cll" clip-path="url(#cc2)"></g>
      <g id="cdt"></g>
      <g id="clb"></g>
    </svg>
    <div class="leg" id="leg"></div>
  </div>
</div>
<script>
var FD=[
  {name:"Feeder 1",desc:"Best",      F:5,col:"#185FA5",dk:"#042C53",bg:"#E6F1FB",ang:135},
  {name:"Feeder 2",desc:"Very good", F:4,col:"#3B6D11",dk:"#173404",bg:"#EAF3DE",ang:45},
  {name:"Feeder 3",desc:"OK",        F:2,col:"#0F6E56",dk:"#04342C",bg:"#E1F5EE",ang:225},
  {name:"Feeder 4",desc:"Poor",      F:1,col:"#993C1D",dk:"#4A1B0C",bg:"#FAECE7",ang:315},
];
var CX=148,CY=124,RX=110,RY=80;
function toR(a){return a*Math.PI/180;}
var FP=FD.map(function(f){
  var r=toR(f.ang);
  return{
    fx:CX+RX*Math.cos(r),      fy:CY-RY*Math.sin(r),
    cx:CX+0.60*RX*Math.cos(r), cy:CY-0.60*RY*Math.sin(r),
    bx:CX+0.76*RX*Math.cos(r), by:CY-0.76*RY*Math.sin(r)
  };
});
var N=11, act=[true,true,true,true];

function ringPos(n){
  var p=[];
  if(!n)return p;
  p.push([0,0]);
  for(var ring=1;p.length<n;ring++){
    var rad=ring*11.5;
    var cap=Math.max(6,Math.round(2*Math.PI*rad/12.5));
    for(var k=0;k<cap&&p.length<n;k++){
      var a=k/cap*2*Math.PI-Math.PI/2;
      p.push([rad*Math.cos(a),rad*Math.sin(a)]);
    }
  }
  return p;
}

function computeIFD(){
  var ai=[],res=FD.map(function(){return 0;});
  act.forEach(function(v,i){if(v)ai.push(i);});
  if(!ai.length||!N)return res;
  for(var d=0;d<N;d++){
    var bi=-1,bs=-Infinity;
    ai.forEach(function(i){
      var s=FD[i].F/(res[i]+1);
      if(bi===-1||s>bs||(s===bs&&FD[i].F>FD[bi].F)){bs=s;bi=i;}
    });
    res[bi]++;
  }
  return res;
}

function computeLam(al){
  var sum=0,any=false;
  FD.forEach(function(f,i){if(act[i]&&al[i]>0){sum+=f.F;any=true;}});
  return (any&&N)?sum/N:null;
}

var NS='http://www.w3.org/2000/svg';
function mk(t){return document.createElementNS(NS,t);}
function sa(e,o){Object.keys(o).forEach(function(k){e.setAttribute(k,o[k]);});return e;}
function clr(e){while(e.firstChild)e.removeChild(e.firstChild);}
function gel(id){return document.getElementById(id);}
function p1(n){return n.toFixed(1);}
function mkt(a,t){var el=sa(mk('text'),a);el.textContent=String(t);return el;}

function makeDuck(ox,oy){
  var gr=mk('g');
  sa(gr,{transform:'translate('+p1(ox)+','+p1(oy)+')',
    stroke:'rgba(0,0,0,0.15)','stroke-width':'0.3','stroke-linejoin':'round'});
  var c='#F5F1E8';
  [
    [mk('ellipse'),{cx:0,cy:2,rx:6.5,ry:3.8,fill:c,transform:'rotate(-10,0,2)'}],
    [mk('ellipse'),{cx:-4.8,cy:-1.4,rx:3.7,ry:3.2,fill:c}],
    [mk('polygon'),{points:'-8.2,-1 -11.5,-0.4 -8.2,0.7',fill:'#D08820',stroke:'none'}],
    [mk('circle'), {cx:-5.7,cy:-2.8,r:1,fill:'rgba(0,0,0,0.55)',stroke:'none'}],
    [mk('ellipse'),{cx:6,cy:0,rx:2.5,ry:1.5,fill:c,transform:'rotate(15,6,0)'}]
  ].forEach(function(pair){sa(pair[0],pair[1]);gr.appendChild(pair[0]);});
  return gr;
}

function drawPond(al){
  var dEl=gel('ducks'),fEl=gel('feeders');
  clr(dEl);clr(fEl);
  FD.forEach(function(f,i){
    if(!act[i])return;
    var cx=FP[i].cx,cy=FP[i].cy;
    ringPos(al[i]).forEach(function(p){dEl.appendChild(makeDuck(cx+p[0],cy+p[1]));});
  });
  FD.forEach(function(f,i){
    var fp=FP[i],on=act[i];
    var gr=mk('g'); gr.style.cursor='pointer';
    (function(idx){gr.addEventListener('click',function(){act[idx]=!act[idx];update();});})(i);
    if(on){
      var nc=Math.min(7,Math.max(1,Math.round(f.F)));
      [[0,0],[-3.5,2.5],[3.5,-2.5],[0,-4.5],[-3.5,-2.5],[3.5,2.5],[0,4.5]].slice(0,nc)
        .forEach(function(off){
          gr.appendChild(sa(mk('circle'),{cx:p1(fp.bx+off[0]),cy:p1(fp.by+off[1]),
            r:2.3,fill:'#EDBB15',stroke:'#A07808','stroke-width':'0.6',opacity:0.95}));
        });
    }
    var fr=9+f.F*1.3;
    gr.appendChild(sa(mk('circle'),{cx:p1(fp.fx),cy:p1(fp.fy),r:p1(fr),
      fill:on?f.col:'#888780',stroke:'#fff','stroke-width':2}));
    var lbl=sa(mk('text'),{x:p1(fp.fx),y:p1(fp.fy+0.5),'text-anchor':'middle',
      'dominant-baseline':'central',fill:'#fff','font-size':11,'font-weight':600,
      'font-family':'system-ui,sans-serif'});
    lbl.textContent=i+1; gr.appendChild(lbl);
    var cnt=sa(mk('text'),{x:p1(fp.fx),y:p1(fp.fy-fr-7),'text-anchor':'middle',
      'dominant-baseline':'central',fill:on?f.col:'#9A9890','font-size':11,'font-weight':600,
      'font-family':'system-ui,sans-serif'});
    cnt.textContent=on?('\xd7'+al[i]):'off'; gr.appendChild(cnt);
    fEl.appendChild(gr);
  });
}

var PAD={t:14,r:86,b:36,l:46};
var CW=460,CH=196,xMx=15,yMx=6;
var iW=CW-PAD.l-PAD.r, iH=CH-PAD.t-PAD.b;
function tX(x){return PAD.l+x/xMx*iW;}
function tY(y){return CH-PAD.b-y/yMx*iH;}

var CGRID='rgba(0,0,0,0.10)', CAXIS='rgba(0,0,0,0.30)', CTXT2='#5f5e5a', CTXT3='#9a9890', CBGP='#ffffff';

function drawChart(al,lam){
  var gc=gel('cgr'); clr(gc);
  for(var y=1;y<=5;y++){
    var ty=tY(y);
    gc.appendChild(sa(mk('line'),{x1:PAD.l,x2:CW-PAD.r,y1:ty,y2:ty,stroke:CGRID,'stroke-width':'0.8'}));
  }
  for(var x=3;x<=xMx;x+=3){
    var tx=tX(x);
    gc.appendChild(sa(mk('line'),{x1:tx,x2:tx,y1:PAD.t,y2:CH-PAD.b,stroke:CGRID,'stroke-width':'0.8'}));
  }

  var ax=gel('cax'); clr(ax);
  ax.appendChild(sa(mk('line'),{x1:PAD.l,x2:CW-PAD.r,y1:CH-PAD.b,y2:CH-PAD.b,stroke:CAXIS,'stroke-width':1}));
  ax.appendChild(sa(mk('line'),{x1:PAD.l,x2:PAD.l,y1:PAD.t,y2:CH-PAD.b,stroke:CAXIS,'stroke-width':1}));
  for(var x=0;x<=xMx;x+=3){
    var tx=tX(x);
    ax.appendChild(sa(mk('line'),{x1:tx,x2:tx,y1:CH-PAD.b,y2:CH-PAD.b+4,stroke:CAXIS,'stroke-width':'0.5'}));
    ax.appendChild(mkt({x:tx,y:CH-PAD.b+13,'text-anchor':'middle','font-size':10,
      fill:CTXT3,'font-family':'system-ui,sans-serif'},x));
  }
  for(var y=1;y<=5;y++){
    var ty=tY(y);
    ax.appendChild(sa(mk('line'),{x1:PAD.l-4,x2:PAD.l,y1:ty,y2:ty,stroke:CAXIS,'stroke-width':'0.5'}));
    ax.appendChild(mkt({x:PAD.l-6,y:ty,'text-anchor':'end','dominant-baseline':'central',
      'font-size':10,fill:CTXT3,'font-family':'system-ui,sans-serif'},y));
  }
  FD.forEach(function(f,i){
    if(!act[i])return;
    var ty=tY(f.F);
    if(ty<PAD.t||ty>CH-PAD.b)return;
    ax.appendChild(sa(mk('line'),{x1:PAD.l-4,x2:PAD.l,y1:ty,y2:ty,stroke:f.col,'stroke-width':3}));
  });
  ax.appendChild(mkt({x:PAD.l+iW/2,y:CH-1,'text-anchor':'middle','font-size':11,
    fill:CTXT2,'font-family':'system-ui,sans-serif'},'occupancy  x'));
  var yl=sa(mk('text'),{x:8,y:PAD.t+iH/2,'text-anchor':'middle','dominant-baseline':'central',
    'font-size':11,fill:CTXT2,'font-family':'system-ui,sans-serif',
    transform:'rotate(-90,8,'+(PAD.t+iH/2)+')'});
  yl.textContent='S(x)'; ax.appendChild(yl);

  var cv=gel('ccv'); clr(cv);
  FD.forEach(function(f,i){
    if(!act[i])return;
    cv.appendChild(sa(mk('line'),{x1:p1(tX(0)),y1:p1(tY(f.F)),x2:p1(tX(1)),y2:p1(tY(f.F)),
      stroke:f.col,'stroke-width':2}));
    var pts=[];
    for(var k=0;k<240;k++){
      var xv=1+k*(xMx-1)/239;
      pts.push(p1(tX(xv))+','+p1(tY(f.F/xv)));
    }
    cv.appendChild(sa(mk('polyline'),{points:pts.join(' '),fill:'none',stroke:f.col,'stroke-width':2}));
  });

  var cll=gel('cll'); clr(cll);
  if(lam!==null){
    var ly=tY(lam);
    cll.appendChild(sa(mk('line'),{x1:PAD.l,x2:CW-PAD.r,y1:ly,y2:ly,
      stroke:CTXT2,'stroke-width':1.5,'stroke-dasharray':'6 3',opacity:0.7}));
  }

  var clb=gel('clb'); clr(clb);
  if(lam!==null){
    var ly=tY(lam);
    var ly2=Math.max(PAD.t+9,Math.min(CH-PAD.b-9,ly));
    clb.appendChild(sa(mk('line'),{x1:CW-PAD.r,x2:CW-PAD.r+4,y1:ly,y2:ly,
      stroke:CTXT2,'stroke-width':1.5}));
    clb.appendChild(mkt({x:CW-PAD.r+6,y:ly2,'dominant-baseline':'central',
      'font-size':10,'font-weight':600,fill:CTXT2,'font-family':'system-ui,sans-serif'},
      '\u03bb\u2009=\u2009'+lam.toFixed(2)));
  }

  var cd=gel('cdt'); clr(cd);
  FD.forEach(function(f,i){
    var xi=al[i],on=act[i];
    if(!on||xi===0){
      var dy=tY(f.F);
      cd.appendChild(sa(mk('circle'),{cx:p1(tX(0)),cy:p1(dy),r:4.5,
        fill:CBGP,stroke:f.col,'stroke-width':1.5,opacity:on?0.75:0.3}));
      return;
    }
    if(xi>xMx)return;
    var sy=f.F/xi,dy=tY(sy);
    cd.appendChild(sa(mk('circle'),{cx:p1(tX(xi)),cy:p1(dy),r:5.5,
      fill:f.col,stroke:CBGP,'stroke-width':2}));
  });
}

function updateLam(al,lam){
  var el=gel('lam');
  if(!lam){el.textContent='No active feeders.';return;}
  var occ=FD.filter(function(f,i){return act[i]&&al[i]>0;});
  var sumF=occ.reduce(function(s,f){return s+f.F;},0);
  el.innerHTML='&#955; = &#x03A3;{F<sub>i</sub>\u2009:\u2009x<sub>i</sub>\u2009&gt;\u20090} / N'
    +'\u2009=\u2009'+sumF+'\u2009/\u2009'+N
    +'\u2009\u2248\u2009<strong>'+lam.toFixed(3)+'</strong>'
    +'\u2003\u2014\u2003equilibrium suitability'
    +'\u2003('+occ.length+'\u2009patch'+(occ.length!==1?'es':'')+' occupied)';
}

function makeBtn(f,i){
  var btn=document.createElement('button');
  btn.id='fb'+i;
  btn.className='fbtn'+(act[i]?'':' off');
  btn.style.borderColor=f.col;
  btn.style.background=act[i]?f.bg:'#e8e6e0';
  btn.style.color=act[i]?f.dk:'#5f5e5a';
  btn.style.fontFamily='system-ui,sans-serif';
  btn.innerHTML='<div class="fn">'+f.name+'</div>'
    +'<div class="fs2">'+f.desc+' \xb7 F<sub>'+(i+1)+'</sub>\u2009=\u2009'+f.F+'</div>'
    +'<div class="fa" id="ba'+i+'"></div>';
  (function(idx){btn.addEventListener('click',function(){act[idx]=!act[idx];update();});})(i);
  return btn;
}

function buildButtons(){
  var fl=gel('fleft'),fr=gel('fright');
  while(fl.firstChild)fl.removeChild(fl.firstChild);
  while(fr.firstChild)fr.removeChild(fr.firstChild);
  fl.appendChild(makeBtn(FD[0],0));
  fl.appendChild(makeBtn(FD[2],2));
  fr.appendChild(makeBtn(FD[1],1));
  fr.appendChild(makeBtn(FD[3],3));
}

function updateButtons(al){
  FD.forEach(function(f,i){
    var btn=gel('fb'+i);
    if(btn){
      btn.className='fbtn'+(act[i]?'':' off');
      btn.style.background=act[i]?f.bg:'#e8e6e0';
      btn.style.color=act[i]?f.dk:'#5f5e5a';
    }
    var ba=gel('ba'+i);
    if(!ba)return;
    if(!act[i])ba.textContent='\u2014 off \u2014';
    else if(al[i]===0)ba.textContent='x\u2009=\u20090 (truncated)';
    else ba.textContent='x\u2009=\u2009'+al[i]+' duck'+(al[i]!==1?'s':'');
  });
}

function buildLegend(){
  var leg=gel('leg');
  while(leg.firstChild)leg.removeChild(leg.firstChild);
  FD.forEach(function(f,i){
    var d=document.createElement('div'); d.className='li'; d.style.opacity=act[i]?'1':'.35';
    var sw=document.createElement('div'); sw.className='ls'; sw.style.background=f.col;
    var tx=document.createElement('span');
    tx.innerHTML=f.name+': F<sub>'+(i+1)+'</sub>\u2009=\u2009'+f.F;
    d.appendChild(sw); d.appendChild(tx); leg.appendChild(d);
  });
}

function update(){
  var al=computeIFD(),lam=computeLam(al);
  gel('nv').textContent=N;
  drawPond(al); drawChart(al,lam); updateLam(al,lam); updateButtons(al); buildLegend();
}

gel('nsl').addEventListener('input',function(){N=+this.value;update();});
buildButtons(); update();
</script>

if (window.self !== window.top) { var f = document.querySelector('footer'); if (f) f.style.display = 'none'; }
