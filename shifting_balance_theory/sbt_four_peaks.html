<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shifting Balance Theory — interactive explainer</title>
  <meta name="description" content="An interactive walkthrough of Sewall Wright's Shifting Balance Theory: how genetic drift, within-deme selection, and interdemic migration allow a metapopulation to escape local fitness peaks.">

  <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Shifting Balance Theory — interactive explainer">
  <meta property="og:description" content="Step through the three phases of Wright's SBT: selection only, genetic drift, within-deme selection, and post-migration balance.">
  <meta property="og:image" content="https://tpavlic.github.io/asu-bioinspired-ai-and-optimization/shifting_balance_theory/sbt_four_peaks-preview.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Shifting Balance Theory — interactive explainer">
  <meta name="twitter:description" content="Step through the three phases of Wright's SBT: selection only, genetic drift, within-deme selection, and post-migration balance.">

<body>
<style>
.wrap{padding:1rem 0;font-family:sans-serif}
.inner{width:640px;max-width:100%}
.instr{font-size:12px;color:#888;margin-bottom:.5rem}
.controls{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap}
.phtab{flex:1;min-width:80px;padding:8px 10px;border-radius:6px;border:1.5px solid #aaa;text-align:center;font-size:13px;font-weight:500;color:#444;background:#fff;cursor:pointer;user-select:none;transition:background .12s,color .12s,border-color .12s}
.phtab:hover{background:#f0f0f0;color:#111;border-color:#666}
.phtab.on{background:#085041;color:#9FE1CB;border-color:#085041}
.cap{font-size:13px;color:#555;line-height:1.6;min-height:64px;margin:.75rem 0 0}
</style>

<div class="wrap">
<div class="inner">
  <div class="instr">Click a phase to step through the theory:</div>
  <div class="controls">
    <div class="phtab" id="tab0">0 · selection only</div>
    <div class="phtab" id="tab1">I · drift</div>
    <div class="phtab" id="tab2">II · selection</div>
    <div class="phtab" id="tab3">III · post-migration</div>
  </div>
  <canvas id="cv" style="width:100%;height:auto;display:block;border-radius:8px;border:1px solid #ddd"></canvas>
  <div class="cap" id="cap"></div>
</div>
</div>

<script>
(function(){
const cv=document.getElementById('cv');
const dpr=window.devicePixelRatio||1;
const W=640,H=320;
cv.width=W*dpr;cv.height=H*dpr;
const ctx=cv.getContext('2d');
ctx.scale(dpr,dpr);

const PL=52,PR=16,PT=44,PB=56;
const CW=W-PL-PR,CH=H-PT-PB;
function mx(x){return PL+x*CW;}
function my(f){return PT+(1-f)*CH;}
function fit(x){
  return .04
    +.38*Math.exp(-110*Math.pow(x-.10,2))
    +.39*Math.exp(-110*Math.pow(x-.35,2))
    +.82*Math.exp(-110*Math.pow(x-.65,2))
    +.80*Math.exp(-110*Math.pow(x-.90,2));
}

const DEMES=[
  {name:'Deme A',f:'#85B7EB',s:'#185FA5'},
  {name:'Deme B',f:'#FAC775',s:'#854F0B'},
  {name:'Deme C',f:'#AFA9EC',s:'#534AB7'},
  {name:'Deme D',f:'#F0997B',s:'#993C1D'},
];
const JIT=[[2,-1,3,-2,1,-3,2],[-1,2,-3,1,-2,3,-1],[1,-2,2,-1,3,-2,1],[-2,1,-1,3,-1,2,-3]];

const PHASES=[
  [[.091,.096,.101,.106,.111,.116,.121],
   [.094,.099,.104,.109,.114,.119,.124],
   [.343,.348,.353,.358,.363,.368,.373],
   [.346,.351,.356,.361,.366,.371,.376]],
  [[.055,.080,.098,.116,.138,.508,.526],
   [.060,.085,.103,.121,.143,.514,.532],
   [.278,.306,.328,.352,.376,.782,.800],
   [.284,.312,.336,.358,.382,.788,.806]],
  [[.090,.100,.108,.116,.124,.636,.649],
   [.094,.104,.112,.120,.128,.641,.654],
   [.344,.354,.362,.370,.378,.882,.895],
   [.348,.358,.366,.374,.382,.887,.900]],
  [[.604,.618,.632,.646,.660,.672,.684],
   [.609,.623,.637,.651,.665,.677,.689],
   [.858,.870,.882,.896,.910,.922,.934],
   [.863,.875,.887,.901,.915,.927,.939]],
];

const CAPS=[
  'Phase 0 — selection only (no drift). In the hypothetical absence of drift, selection pins each deme tightly to the nearest local fitness peak. The two low peaks are stable equilibria; no force can push a deme across the adaptive valley. This is the case that motivates the problem: selection alone is insufficient to explore the landscape.',
  'Phase I — genetic drift. Small effective population sizes produce a balance of mutation, drift, and selection. Each within-deme distribution widens across allele-frequency space. The bracket shows this spread across all four demes: two individuals per deme have stochastically crossed the unstable equilibrium at the valley floor — a move selection would actively oppose.',
  'Phase II — within-deme selection. Individuals that drifted past the unstable equilibrium at the valley floor are pulled uphill toward their nearest high peak (A & B toward high peak 1; C & D toward high peak 2). Individuals that did not cross are pulled back to their original low peaks. The "shift" arrows mark the direction of selection for those lucky crossers.',
  'Phase III — post-migration balance. High-fitness pioneer individuals export migrants, dragging the remaining low-peak demes up to the high peaks. Once there, a new balance of mutation, drift, and selection establishes around the high peaks — shown by the bracket. The new drift spread is narrow enough that it does not reach the valley between the two high peaks, so the metapopulation stays on its new peaks.',
];

let cur=0,from=0,prog=1,raf;
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function lerp(a,b,t){return a+(b-a)*t;}

function arrowhead(x1,y1,x2,y2,len,col){
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-len*Math.cos(a-.38),y2-len*Math.sin(a-.38));
  ctx.lineTo(x2-len*Math.cos(a+.38),y2-len*Math.sin(a+.38));
  ctx.closePath();ctx.fill();
}

function drawBracket(xlo,xhi,col,label,yFit){
  const by=my(yFit);
  ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(mx(xlo),by-5);ctx.lineTo(mx(xlo),by+2);
  ctx.lineTo(mx(xhi),by+2);ctx.lineTo(mx(xhi),by-5);ctx.stroke();
  ctx.fillStyle=col;ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText(label,mx((xlo+xhi)/2),by+13);
}

function drawLegend(){
  const dotR=5,gap=6,itemGap=18;
  ctx.font='11px sans-serif';
  const itemWidths=DEMES.map(d=>dotR*2+gap+ctx.measureText(d.name).width);
  const totalW=itemWidths.reduce((s,w)=>s+w,0)+itemGap*(DEMES.length-1);
  let x=(W-totalW)/2;
  const y=PT/2;
  DEMES.forEach((d,i)=>{
    ctx.beginPath();ctx.arc(x+dotR,y,dotR,0,2*Math.PI);
    ctx.fillStyle=d.f;ctx.fill();
    ctx.strokeStyle=d.s;ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#5F5E5A';ctx.textAlign='left';
    ctx.fillText(d.name,x+dotR*2+gap,y+4);
    x+=itemWidths[i]+itemGap;
  });
}

function drawCopyright(){
  ctx.font='9px sans-serif';
  ctx.fillStyle='rgba(136,135,128,.55)';
  ctx.textAlign='right';
  ctx.fillText('\u00a9 2026 Theodore P. Pavlic \u00b7 MIT License',W-PR,H-6);
}

function drawFrame(){
  ctx.clearRect(0,0,W,H);
  const t=ease(Math.min(1,prog));

  ctx.beginPath();ctx.moveTo(mx(0),my(0));ctx.lineTo(mx(0),my(fit(0)));
  for(let i=1;i<=500;i++)ctx.lineTo(mx(i/500),my(fit(i/500)));
  ctx.lineTo(mx(1),my(0));ctx.closePath();
  ctx.fillStyle='rgba(29,158,117,.07)';ctx.fill();

  ctx.beginPath();ctx.moveTo(mx(0),my(fit(0)));
  for(let i=1;i<=500;i++)ctx.lineTo(mx(i/500),my(fit(i/500)));
  ctx.strokeStyle='#1D9E75';ctx.lineWidth=2;ctx.stroke();

  ctx.strokeStyle='rgba(136,135,128,.22)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(mx(0),my(0)+1);ctx.lineTo(mx(1),my(0)+1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx(0)-1,my(0));ctx.lineTo(mx(0)-1,my(.99));ctx.stroke();

  ctx.fillStyle='#888';ctx.font='11px sans-serif';
  ctx.textAlign='center';ctx.fillText('allele frequency  p',mx(.5),my(0)+38);
  ctx.save();ctx.translate(13,my(.5));ctx.rotate(-Math.PI/2);
  ctx.fillText('mean fitness  f(p)',0,0);ctx.restore();

  [[.10,'low','#854F0B'],[.35,'low','#854F0B'],[.65,'high','#085041'],[.90,'high','#085041']].forEach(([px,lbl,c])=>{
    ctx.fillStyle=c;ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(lbl+' peak',mx(px),my(fit(px))-12);
  });

  drawLegend();
  drawCopyright();

  if(cur===0){
    const aa=Math.min(1,t*2);
    ctx.globalAlpha=aa;
    [[.091,.124,'A+B'],[.342,.377,'C+D']].forEach(([lo,hi,lbl])=>{
      const by=my(0)+20;
      ctx.strokeStyle='rgba(136,135,128,.45)';ctx.lineWidth=.8;ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(mx(lo),by-4);ctx.lineTo(mx(lo),by+2);
      ctx.lineTo(mx(hi),by+2);ctx.lineTo(mx(hi),by-4);ctx.stroke();
      ctx.fillStyle='#5F5E5A';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText('2 demes ('+lbl+')',mx((lo+hi)/2),by+12);
    });
    ctx.globalAlpha=1;
  }

  if(cur===1||(from===1&&t<.6)){
    const aa=cur===1?Math.min(1,t*1.8):Math.max(0,1-(t/.6));
    if(aa>.01){
      ctx.globalAlpha=aa;
      const allX=PHASES[1].flat();
      drawBracket(Math.min(...allX),Math.max(...allX),'#185FA5','balance of mutation, drift, and selection  (all demes)',.075);
      ctx.globalAlpha=1;
    }
  }

  if(cur===2||(from===2&&t<.5)){
    const aa=cur===2?Math.min(1,t*2.5):Math.max(0,1-t/.5);
    ctx.globalAlpha=aa;
    [[.22,.55,'#534AB7'],[.44,.78,'#854F0B']].forEach(([x1,x2,col])=>{
      const ay1=my(.12),ay2=my(.20);
      ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(mx(x1),ay1);ctx.lineTo(mx(x2),ay2);ctx.stroke();
      arrowhead(mx(x1),ay1,mx(x2),ay2,9,col);
    });
    ctx.fillStyle='#534AB7';ctx.font='500 11px sans-serif';ctx.textAlign='center';
    ctx.fillText('shift',mx(.385),my(.12)-9);
    ctx.fillStyle='#854F0B';
    ctx.fillText('shift',mx(.615),my(.12)-9);
    ctx.globalAlpha=1;
  }

  if(cur===3){
    const aa=Math.min(1,(t-.2)*1.6);
    if(aa>.01){
      ctx.globalAlpha=Math.max(0,aa);
      [[.65,.10],[.90,.35]].forEach(([src,dst])=>{
        const ang=Math.atan2(my(fit(dst))-my(fit(src)),mx(dst)-mx(src));
        const r=8;
        const sx=mx(src)+r*Math.cos(ang),sy=my(fit(src))+r*Math.sin(ang);
        const ex=mx(dst)-r*Math.cos(ang),ey=my(fit(dst))-r*Math.sin(ang);
        ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(29,158,117,.32)';ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
        ctx.setLineDash([]);
        arrowhead(sx,sy,ex,ey,8,'rgba(29,158,117,.55)');
      });
      ctx.setLineDash([]);
      const allX3=PHASES[3].flat();
      drawBracket(Math.min(...allX3),Math.max(...allX3),'#085041','new balance of mutation, drift, and selection  (all demes)',.075);
      ctx.fillStyle='rgba(8,80,65,.9)';ctx.font='11px sans-serif';ctx.textAlign='center';
      [.65,.90].forEach(px=>ctx.fillText('new balance',mx(px),my(fit(px))-26));
      ctx.globalAlpha=1;
    }
  }

  for(let d=0;d<4;d++){
    for(let i=0;i<7;i++){
      const x=lerp(PHASES[from][d][i],PHASES[cur][d][i],t);
      const iy=my(fit(x))+JIT[d][i];
      ctx.beginPath();ctx.arc(mx(x),iy,5.5,0,2*Math.PI);
      ctx.fillStyle=DEMES[d].f;ctx.fill();
      ctx.strokeStyle=DEMES[d].s;ctx.lineWidth=1.5;ctx.stroke();
    }
  }

  if(prog<1){prog+=.02;raf=requestAnimationFrame(drawFrame);}
}

function stepTo(p){
  cancelAnimationFrame(raf);
  from=cur;cur=Math.max(0,Math.min(3,p));prog=0;
  for(let i=0;i<4;i++){
    document.getElementById('tab'+i).className='phtab'+(cur===i?' on':'');
  }
  document.getElementById('cap').textContent=CAPS[cur];
  drawFrame();
}

for(let i=0;i<4;i++){
  document.getElementById('tab'+i).addEventListener('click',(function(p){
    return function(){stepTo(p);};
  })(i));
}
stepTo(0);
})();
</script>
<footer style="margin-top:1.5rem;padding-top:0.75rem;border-top:1px solid #e0e0e0;font-size:0.8rem;color:#888;">
  <a href="../" style="color:#2e7d32;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">&larr; All course visualizations</a>
</footer>
</body>
</html>
